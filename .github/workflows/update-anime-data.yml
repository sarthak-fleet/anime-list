name: Update Catalog Data

on:
  schedule:
    # Daily at 00:00 UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Update anime data
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          echo "Starting anime data update..."
          pnpm run db:update
          echo "✓ Anime data updated successfully"

      - name: Update manga data
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_MANGA_DATABASE_URL: ${{ secrets.TURSO_MANGA_DATABASE_URL }}
          TURSO_MANGA_AUTH_TOKEN: ${{ secrets.TURSO_MANGA_AUTH_TOKEN }}
        run: |
          echo "Starting manga data update..."
          pnpm run db:update:manga
          echo "✓ Manga data updated successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Catalog data update failed. Check workflow logs."
