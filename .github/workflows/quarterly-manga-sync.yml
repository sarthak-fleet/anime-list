name: Quarterly Manga Sync

on:
  schedule:
    # Quarterly at 01:00 UTC on Jan 1, Apr 1, Jul 1, Oct 1 (after anime sync)
    - cron: "0 1 1 1,4,7,10 *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Run quarterly manga sync
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_MANGA_DATABASE_URL: ${{ secrets.TURSO_MANGA_DATABASE_URL }}
          TURSO_MANGA_AUTH_TOKEN: ${{ secrets.TURSO_MANGA_AUTH_TOKEN }}
        run: |
          echo "Starting quarterly manga sync (full top-list refresh)..."
          pnpm run db:update:manga:full
          echo "✓ Quarterly manga sync finished"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Quarterly manga sync failed. Check workflow logs."
