    <link rel="manifest" href="/manifest.webmanifest" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Shelf",
        "description": "Filter and explore 35,000+ anime and manga titles from MyAnimeList. Search, stats, and a personal watchlist in one place.",
        "url": "https://anime-list-9lk.pages.dev",
        "applicationCategory": "EntertainmentApplication",

        "offers": {
          "@type": "Offer",
          "price": "0",

  <body data-analytics="true" style="margin:0;background:#09090b;color:#fafafa;font-family:system-ui,sans-serif;">
    <!-- LCP shell: mirrors home hero so first paint doesn't wait on React + fonts + CSS. -->
    <div id="root">
      <div style="min-height:100vh;">
        <header style="border-bottom:1px solid #27272a;">
          <div style="margin:0 auto;max-width:80rem;padding:1rem 1.5rem;">
            <span style="font-size:1rem;font-weight:600;">Shelf</span>
          </div>
        </header>
        <main style="max-width:48rem;margin:0 auto;padding:6rem 1.5rem 5rem;text-align:center;">
          <p style="margin:0 0 1.5rem;display:inline-flex;align-items:center;gap:0.5rem;padding:0.25rem 0.75rem;border-radius:9999px;border:1px solid #27272a;background:#18181b;font-size:0.75rem;color:#a1a1aa;">
            Anime &amp; manga, indexed from MyAnimeList
          </p>
          <h1 style="margin:0;font-size:clamp(2.25rem,5vw,3.75rem);font-weight:600;line-height:1.1;letter-spacing:-0.02em;">
            Find your next anime in 30 seconds.
          </h1>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
